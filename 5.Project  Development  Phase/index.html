<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credit Card Eligibility Predictor</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <div class="header-icon">💳</div>
        <h2>Credit Card Eligibility</h2>
        <p class="subtitle">Enter your details to check approval status</p>
      </div>

      <form id="predictionForm">
        <!-- Row 1 -->
        <div class="form-row">
          <div class="form-group">
            <label>Gender</label>
            <select id="gender">
              <option value="0">Female</option>
              <option value="1">Male</option>
            </select>
          </div>

          <div class="form-group">
            <label>Age</label>
            <input
              type="number"
              id="age"
              placeholder="e.g. 30"
              min="18"
              max="100"
              step="0.1"
              required
            />
          </div>
        </div>

        <!-- Row 2 -->
        <div class="form-row">
          <div class="form-group">
            <label>Marital Status</label>
            <select id="married">
              <option value="1">Married</option>
              <option value="0">Single</option>
            </select>
          </div>

          <div class="form-group">
            <label>Bank Customer</label>
            <select id="bank_customer">
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>
        </div>

        <!-- Row 3 -->
        <div class="form-row">
          <div class="form-group">
            <label>Currently Employed</label>
            <select id="employed">
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>

          <div class="form-group">
            <label>Prior Default</label>
            <select id="prior_default">
              <option value="1">No Default ✅</option>
              <option value="0">Has Default ❌</option>
            </select>
          </div>
        </div>

        <!-- Row 4 -->
        <div class="form-row">
          <div class="form-group">
            <label>Annual Income ($)</label>
            <input
              type="number"
              id="income"
              placeholder="e.g. 50000"
              min="0"
              step="1"
              required
            />
          </div>

          <div class="form-group">
            <label>Total Debt ($)</label>
            <input
              type="number"
              id="debt"
              placeholder="e.g. 1.5"
              min="0"
              step="0.01"
              required
            />
          </div>
        </div>

        <!-- Row 5 -->
        <div class="form-row">
          <div class="form-group">
            <label>Years Employed</label>
            <input
              type="number"
              id="years_employed"
              placeholder="e.g. 5"
              min="0"
              step="0.1"
              required
            />
          </div>

          <div class="form-group">
            <label>Credit Score</label>
            <input
              type="number"
              id="credit_score"
              placeholder="e.g. 8"
              min="0"
              step="1"
              required
            />
          </div>
        </div>

        <!-- Row 6 - Industry Full List -->
        <div class="form-group">
          <label>Industry</label>
          <select id="industry">
            <option value="CommunicationServices">
              Communication Services
            </option>
            <option value="ConsumerDiscretionary">
              Consumer Discretionary
            </option>
            <option value="ConsumerStaples">Consumer Staples</option>
            <option value="Education">Education</option>
            <option value="Energy">Energy</option>
            <option value="Financials">Financials</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Industrials">Industrials</option>
            <option value="InformationTechnology">
              Information Technology
            </option>
            <option value="Materials">Materials</option>
            <option value="Real Estate">Real Estate</option>
            <option value="Research">Research</option>
            <option value="Transport">Transport</option>
            <option value="Utilities">Utilities</option>
          </select>
        </div>

        <!-- Row 7 - Citizenship -->
        <div class="form-group">
          <label>Citizenship Status</label>
          <select id="citizen">
            <option value="ByBirth">By Birth</option>
            <option value="ByOtherMeans">By Other Means</option>
            <option value="Temporary">Temporary</option>
          </select>
        </div>

        <button type="submit" id="submitBtn">
          <span id="btnText">Check Eligibility</span>
          <span id="btnLoader" style="display: none">⏳ Checking...</span>
        </button>
      </form>

      <!-- Result Box -->
      <div id="resultBox" style="display: none">
        <div id="resultIcon"></div>
        <div id="resultText"></div>
        <div id="confidenceText"></div>
      </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
